{% load static i18n %}
<header class="main-header {{ header_class|default:'transparent' }}" id="mainHeader" role="banner">
    <div class="nav-container">
        <div class="logo-section">
            <a href="{% url 'core:homepage' %}" aria-label="Tashkent International University - Home">
                <img src="{% static 'img/branding/logo.png' %}" alt="TIU Logo" style="height: 60px; width: auto;">
            </a>
        </div>

        <nav class="main-nav" id="mainNav" aria-label="Main navigation">
            <ul class="nav-menu" role="menubar">
                {% include "includes/mega_menu.html" %}
            </ul>
            <div class="mobile-lang-switcher">
                {% get_current_language as current_lang %}
                {% get_available_languages as languages %}
                {% for lang_code, lang_name in languages %}
                <form action="{% url 'set_language' %}" method="post" style="display:inline;">
                    {% csrf_token %}
                    <input type="hidden" name="language" value="{{ lang_code }}">
                    <input type="hidden" name="next" value="{{ request.path }}">
                    <button type="submit" class="mobile-lang-btn{% if lang_code == current_lang %} active{% endif %}">{{ lang_code|upper }}</button>
                </form>
                {% endfor %}
            </div>
        </nav>

        <div class="nav-actions">
            <button class="nav-search-btn" id="searchToggle" aria-label="{% trans 'Search' %}">
                <i class="fas fa-search"></i>
            </button>
            <button class="mobile-toggle" aria-label="Toggle navigation menu" aria-expanded="false" aria-controls="mainNav">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </div>
</header>

<!-- Search Overlay -->
<div class="search-overlay" id="searchOverlay">
    <div class="search-overlay-inner">
        <div class="search-overlay-header">
            <div class="search-input-wrap">
                <i class="fas fa-search search-input-icon"></i>
                <input type="text" id="searchInput" class="search-overlay-input" placeholder="{% trans 'Search programs, news, events...' %}" autocomplete="off">
                <button class="search-close-btn" id="searchClose" aria-label="{% trans 'Close search' %}">
                    <i class="fas fa-times"></i>
                </button>
            </div>
        </div>
        <div class="search-overlay-results" id="searchResults"></div>
    </div>
</div>
